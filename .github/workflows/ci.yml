name: CI Auth Service

on:
  push:
    branches: [main, master, develop, feature/**]
  pull_request:
    branches: [main, master, develop]

jobs:
  lint-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: auth_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Lint
        run: ./gradlew ktlintCheck detekt

      - name: Unit and Integration Tests
        env:
          SPRING_PROFILES_ACTIVE: test
        run: ./gradlew test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/**
            **/build/reports/jacoco/**

  postman-smoke:
    runs-on: ubuntu-latest
    needs: lint-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build jar
        run: ./gradlew bootJar

      - name: Start app in background
        run: |
          java -jar build/libs/*.jar --spring.profiles.active=test > app.log 2>&1 &
          echo $! > app.pid

      - name: Wait for app to be ready
        run: |
          echo "Waiting for application to start..."
          for i in {1..60}; do
            if curl -s http://localhost:8081/actuator/health > /dev/null; then
              echo "Application is ready!"
              exit 0
            fi
            echo "Attempt $i/60: Application not ready yet..."
            sleep 2
          done
          echo "Application failed to start within 120 seconds"
          echo "=== Application logs ==="
          cat app.log
          exit 1

      - name: Show application info
        run: |
          echo "Application PID: $(cat app.pid)"
          echo "=== Last 50 lines of app.log ==="
          tail -50 app.log

      - name: Install Newman
        run: npm install -g newman

      - name: Run Postman collection
        run: |
          newman run postman/trainer-hub-auth-service.postman_collection.json \
            -e postman/local.postman_environment.json

      - name: Show application logs on failure
        if: failure()
        run: |
          echo "=== Full application logs ==="
          cat app.log
          echo "=== Process status ==="
          ps aux | grep java || true

      - name: Stop application
        if: always()
        run: |
          if [ -f app.pid ]; then
            kill $(cat app.pid) || true
          fi
